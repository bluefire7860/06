<script>
const data = [
    {id:1, nama:"Bryan"},
    {id:2, nama:"Ilqi"},
    {id:3, nama:"Agung"},
    {id:4, nama:"Egi"},
    {id:5, nama:"Adjie"}
];

// DRY + REUSE + MODULAR
function renderRow(item){
    return `
        <tr>
            <td>${item.id}</td>
            <td>${item.nama}</td>
        </tr>
    `;
}

// SCALABLE (loop data)
function renderTable(){
    let rows = data.map(renderRow).join("");
    document.getElementById("tbody").innerHTML = rows;
}

window.onload = renderTable;
</script>
