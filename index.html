<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tabel Logika OR</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 40px;
        }
        table {
            margin: auto;
            border-collapse: collapse;
            width: 300px;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        .true {
            background-color: #90ee90;
        }
        .false {
            background-color: #f08080;
        }
    </style>
</head>
<body>

<h2>Tabel Logika OR (Render)</h2>

<table>
    <tr>
        <th>A</th>
        <th>B</th>
        <th>A OR B</th>
    </tr>
    <tr>
        <td>0</td>
        <td>0</td>
        <td class="false">0</td>
    </tr>
    <tr>
        <td>0</td>
        <td>1</td>
        <td class="true">1</td>
    </tr>
    <tr>
        <td>1</td>
        <td>0</td>
        <td class="true">1</td>
    </tr>
    <tr>
        <td>1</td>
        <td>1</td>
        <td class="true">1</td>
    </tr>
</table>

</body>
</html>
