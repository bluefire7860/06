<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Render ID Angka</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 40px;
        }
        table {
            border-collapse: collapse;
            margin: auto;
        }
        th, td {
            border: 1px solid black;
            padding: 10px 20px;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        .box {
            padding: 10px;
            background-color: lightblue;
        }
    </style>
</head>
<body>

<h2>Tabel Render (ID 1–5)</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Nama</th>
        <th>Render</th>
    </tr>
    <tr>
        <td>1</td>
        <td>bryan</td>
        <td><div id="id1" class="box">Bryan</div></td>
    </tr>
    <tr>
        <td>2</td>
        <td>ilqi</td>
        <td><div id="id2" class="box">Ilqi</div></td>
    </tr>
    <tr>
        <td>3</td>
        <td>agung</td>
        <td><div id="id3" class="box">Agung</div></td>
    </tr>
    <tr>
        <td>4</td>
        <td>egi</td>
        <td><div id="id4" class="box">Egi</div></td>
    </tr>
    <tr>
        <td>5</td>
        <td>adjie</td>
        <td><div id="id5" class="box">Adjie</div></td>
    </tr>
</table>

</body>
</html>
