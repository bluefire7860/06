<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Render ID</title>
    <style>
        table {
            border-collapse: collapse;
            margin: auto;
            margin-top: 40px;
        }
        th, td {
            border: 1px solid black;
            padding: 10px 20px;
            text-align: center;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        .box {
            padding: 10px;
            background-color: lightblue;
        }
    </style>
</head>
<body>

        <td>bryan</td>
        <td><div id="bryan" class="box">Bryan</div></td>
    </tr>
    <tr>
        <td>ilqi</td>
        <td><div id="ilqi" class="box">Ilqi</div></td>
    </tr>
    <tr>
        <td>agung</td>
        <td><div id="agung" class="box">Agung</div></td>
    </tr>
    <tr>
        <td>egi</td>
        <td><div id="egi" class="box">Egi</div></td>
    </tr>
    <tr>
        <td>adjie</td>
        <td><div id="adjie" class="box">Adjie</div></td>
    </tr>
</table>

</body>
</html>
