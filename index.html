<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Render ID Angka</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 40px;
        }
        table {
            border-collapse: collapse;
            margin: auto;
            margin-bottom: 40px;
        }
        th, td {
            border: 1px solid black;
            padding: 10px 20px;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        .box {
            padding: 10px;
            background-color: lightblue;
        }
    </style>
</head>
<body>

<h2>Tabel 1 (Static)</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Nama</th>
        <th>Render</th>
    </tr>
    <tr>
        <td>1</td>
        <td>bryan</td>
        <td><div id="id1" class="box">Bryan</div></td>
    </tr>
    <tr>
        <td>2</td>
        <td>ilqi</td>
        <td><div id="id2" class="box">Ilqi</div></td>
    </tr>
    <tr>
        <td>3</td>
        <td>agung</td>
        <td><div id="id3" class="box">Agung</div></td>
    </tr>
    <tr>
        <td>4</td>
        <td>egi</td>
        <td><div id="id4" class="box">Egi</div></td>
    </tr>
    <tr>
        <td>5</td>
        <td>adjie</td>
        <td><div id="id5" class="box">Adjie</div></td>
    </tr>
</table>

<h2>Tabel 2 (Dynamic - DRY, Reuse, Modular, Scalable)</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nama</th>
            <th>Render</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>


    
const data = [
    {id: 1, nama: "Bryan"},
    {id: 2, nama: "Ilqi"},
    {id: 3, nama: "Agung"},
    {id: 4, nama: "Egi"},
    {id: 5, nama: "Adjie"}
];



    
function createRow(item) {
    return `
        <tr>
            <td>${item.id}</td>
            <td>${item.nama}</td>
            <td><div class="box">${item.nama}</div></td>
        </tr>
    `;
}


    
function renderTable() {
    const rows = data.map(createRow).join("");
    document.getElementById("tableBody").innerHTML = rows;
}


    
renderTable();
</script>

</body>
</html>
